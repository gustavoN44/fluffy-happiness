services:
  db:
    # pgvector/pgvector ships Postgres with the pgvector extension already
    # compiled in; the CREATE EXTENSION below is what actually enables it.
    image: pgvector/pgvector:pg16
    container_name: rag-eval-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rag}
      POSTGRES_DB: ${POSTGRES_DB:-rag}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Scripts here run once, on first initialization of an empty data dir.
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rag} -d ${POSTGRES_DB:-rag}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
